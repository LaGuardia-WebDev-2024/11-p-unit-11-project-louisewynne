<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="mem1-button">Memory 1</button>
    <button id="mem2-button">Memory 2</button>
    <button id="mem3-button">Memory 3</button>
    <h1>My Top 3 Memories of <span>This Year</span></h1>
    <ul>
      <li>
        <h3 id="mem1">Boston day trip</h3>
        <p>More about this memory.</p>
      </li>

      <li>
        <h3 id="mem2">Halloween</h3>
        <p>More about this memory.</p>
      </li>

      <li>
        <h3 id="mem3">Bowling</h3>
        <p>More about this memory</p>
      </li>
    </ul>
    <div class="container">
    <div id="mem1flip">Boston Day Trip</div>

    <div id="mem2flip">Halloween</div>

    <div id="mem3flip">Bowling</div>
    
    </div>

    <div id="mem1panel">More about this memory...</div>
    <div id="mem2panel">More about this memory...</div>
    <div id="mem3panel">More about this memory...</div>


    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      // ======================== Button #1
      $("#mem1-button").click(function () {
        $("#mem1").css("color", "purple");
      });

      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", "blue");
      });

      // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "green");
        $("#mem3").text("Coding Parties! 🎉");
      });

      $(document).ready(function(){
        $("#mem1flip").click(function(){
        $("#mem1panel").slideDown("slow");
        });
      });

      $(document).ready(function(){
        $("#mem2flip").click(function(){
        $("#mem2panel").slideDown("slow");
        });
      });

      $(document).ready(function(){
        $("#mem3flip").click(function(){
        $("#mem3panel").slideDown("slow");
        });
      });


    </script>
  </body>
</html>
